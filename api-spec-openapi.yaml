openapi: 3.0.3
info:
  title: Tattersall IDP - API de Ingesta de Documentos
  description: |
    # đ Tattersall IDP - API de Ingesta
    
    Bienvenido a la API REST de **Tattersall Document Processing (IDP)**. Este servicio permite a proveedores externos (satĂ©lites) realizar la carga directa de documentos vehiculares hacia el sistema central de gestiĂłn documental inteligente.

    ---

    ### đ Inicio RĂĄpido (Prueba de ConexiĂłn)
    Puedes probar la API de inmediato ejecutando el siguiente comando `curl` en tu terminal (utilizando las credenciales de prueba provistas):

    ```bash
    curl -X PUT "https://kkstm29w21.execute-api.us-east-1.amazonaws.com/dev/documents" \
      -H "x-api-key: abcdefghijklmnopqrstuvxwyz" \
      -H "Content-Type: application/pdf" \
      -H "x-document-type: permiso-circulacion" \
      -H "x-vehicle-id: TEST01" \
      -H "x-provider-id: escala24x7-test" \
      -H "x-filename: nombre-pdf.pdf" \
      --data-binary @ruta/archivo/pdf.pdf
    ```

    ---

    ### đ Seguridad y AutenticaciĂłn
    Para consumir cualquier recurso de esta API, debes incluir tu clave de acceso en las cabeceras HTTP:
    * **Header:** `x-api-key`
    * **Valor:** Clave provista por el administrador (Ej. `abcdefghijklmnopqrstuvxwyz` para pruebas).
    * _Peticiones sin esta cabecera o con claves invĂĄlidas recibirĂĄn una respuesta HTTP `403 Forbidden`._

    ---

    ### đ Resumen de Cabeceras (Headers) Requeridas

    | Cabecera | Tipo | Obligatorio | DescripciĂłn | Ejemplo / Valor |
    | :--- | :---: | :---: | :--- | :--- |
    | `x-api-key` | `string` | **SĂ­** đ | Clave de API asignada | `abcdefghijklmnopqrstuvxwyz` |
    | `Content-Type` | `string` | **SĂ­** đ | Tipo MIME del archivo | `application/pdf` |
    | `x-document-type` | `string` | **SĂ­** đ·ïž | Tipo de documento vehicular | `permiso-circulacion` |
    | `x-vehicle-id` | `string` | **SĂ­** đ | Patente del vehĂ­culo asociado | `TEST01` o `ABCD12` |
    | `x-filename` | `string` | **SĂ­** đ | Nombre original del archivo | `nombre-pdf.pdf` |
    | `x-provider-id` | `string` | No đĄ | ID del proveedor (auditorĂ­a) | `escala24x7-test` |

    ---

    ### đ Formatos de Archivo Aceptados
    El servicio acepta Ășnicamente los siguientes tipos de contenido en el cuerpo de la peticiĂłn (`body`):
    * đ **PDF:** `application/pdf`
    * đ **Word antiguo:** `application/msword` (`.doc`)
    * đ **Word moderno:** `application/vnd.openxmlformats-officedocument.wordprocessingml.document` (`.docx`)

    ---

    ### đ·ïž Tipos de Documento Soportados (`x-document-type`)
    Para una correcta clasificaciĂłn en la plataforma, el header `x-document-type` debe corresponder exactamente a uno de los siguientes valores:
    * `permiso-circulacion` â Permiso de CirculaciĂłn
    * `revision-tecnica` â RevisiĂłn TĂ©cnica
    * `seguro-obligatorio` â SOAP (Seguro Obligatorio)
    * `inscripcion-vehicular` â InscripciĂłn de VehĂ­culo (PadrĂłn)
    * `certificado-emision` â Certificado de Emisiones contaminantes
    * `padron-vehicular` â PadrĂłn del VehĂ­culo
    * `transferencia` â Contrato o solicitud de transferencia
    * `certificado-anotaciones` â Certificado de Anotaciones Vigentes (CAV)
    * `homologacion` â Certificado de HomologaciĂłn
    * `certificado-generico` â Otros certificados vehiculares
    * `otro` â Documento genĂ©rico / no clasificado

    ---

    ### âïž LĂ­mites del Servicio
    * **TamaĂ±o MĂĄximo:** `10 MB` por archivo (lĂ­mite fĂ­sico de API Gateway).
    * **Rate Limiting:** `20 peticiones/segundo` por API Key.
    * **Burst Limit:** `50 peticiones` concurrentes.
    * **Cuota Diaria:** `5,000 peticiones/dĂ­a` por API Key.
    * **Nombramiento en S3:** El archivo se almacena bajo el formato `{nombre-original}-{timestamp}-{id-Ășnico}.{ext}`.
  version: 2.0.0
  contact:
    name: Equipo Escala 24x7

servers:
  - url: https://kkstm29w21.execute-api.us-east-1.amazonaws.com/dev
    description: Servidor de Pruebas (API Gateway de Pruebas)
  - url: https://{apiId}.execute-api.us-east-1.amazonaws.com/dev
    description: Ambiente Desarrollo (Plantilla)
    variables:
      apiId:
        default: "REPLACE_CON_API_ID"

security:
  - ApiKeyAuth: []

tags:
  - name: Ingesta de Documentos
    description: Operaciones para cargar archivos digitales al sistema de almacenamiento inteligente.

paths:
  /documents:
    put:
      tags:
        - Ingesta de Documentos
      summary: Carga directa de documento vehicular
      description: |
        Sube un archivo PDF o Word directamente en formato binario.
        El tamaĂ±o del archivo no debe exceder los 10 MB. Las cabeceras de metadatos son obligatorias para el registro en el catĂĄlogo vehicular.
      operationId: uploadDocument
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-document-type
          in: header
          required: true
          description: |
            Tipo de documento vehicular que se estĂĄ subiendo. Debe coincidir con los tipos de la lista de permitidos.
          schema:
            type: string
            default: permiso-circulacion
            enum:
              - permiso-circulacion
              - revision-tecnica
              - seguro-obligatorio
              - inscripcion-vehicular
              - certificado-emision
              - padron-vehicular
              - transferencia
              - certificado-anotaciones
              - homologacion
              - certificado-generico
              - otro
        - name: x-vehicle-id
          in: header
          required: true
          description: Identificador de la patente del vehĂ­culo. Debe ser alfanumĂ©rico.
          schema:
            type: string
            example: "TEST01"
        - name: x-filename
          in: header
          required: true
          description: Nombre original del archivo, incluyendo la extensiĂłn (.pdf, .doc, .docx).
          schema:
            type: string
            example: "nombre-pdf.pdf"
        - name: x-provider-id
          in: header
          required: false
          description: Identificador Ășnico del proveedor o satĂ©lite para trazabilidad.
          schema:
            type: string
            example: "escala24x7-test"
      requestBody:
        description: Contenido binario del archivo a subir.
        required: true
        content:
          application/pdf:
            schema:
              type: string
              format: binary
          application/msword:
            schema:
              type: string
              format: binary
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Documento subido y catalogado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSuccess'
              example:
                message: "Documento subido exitosamente"
                upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                s3_key: "ingesta/permiso-circulacion/TEST01/nombre-pdf-20260624_152040-8d0323e7.pdf"
                size_bytes: 245000
        '400':
          description: Error en la validaciĂłn de cabeceras o tipo de archivo no soportado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                missing_headers:
                  summary: Cabeceras Requeridas Faltantes
                  value:
                    errors:
                      - "Header x-document-type es requerido"
                      - "Header x-vehicle-id es requerido"
                      - "Header x-filename es requerido"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                invalid_content_type:
                  summary: Content-Type No Soportado
                  value:
                    errors:
                      - "Content-Type no soportado. Permitidos: ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document']"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                invalid_doc_type:
                  summary: Tipo de Documento InvĂĄlido
                  value:
                    errors:
                      - "x-document-type invalido. Permitidos: ['permiso-circulacion', 'revision-tecnica', ...]"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        '403':
          description: Clave de API no provista, expirada o no autorizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
              example:
                message: "Forbidden"
        '500':
          description: Falla interna durante el procesamiento del archivo en el servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Clave de API de autenticaciĂłn.
        
        * **Para Pruebas:** Utilice `abcdefghijklmnopqrstuvxwyz`
        * **Para ProducciĂłn:** Solicite una clave Ășnica al equipo de Tattersall / Escala 24x7.

  schemas:
    UploadSuccess:
      type: object
      description: Respuesta exitosa tras cargar correctamente un documento.
      properties:
        message:
          type: string
          description: Mensaje descriptivo del estado.
          example: "Documento subido exitosamente"
        upload_id:
          type: string
          format: uuid
          description: Identificador Ășnico universal (UUID) de la transacciĂłn para auditorĂ­as.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        s3_key:
          type: string
          description: Ruta exacta donde quedĂł almacenado el archivo en el bucket S3.
          example: "ingesta/permiso-circulacion/TEST01/nombre-pdf-20260624_152040-8d0323e7.pdf"
        size_bytes:
          type: integer
          description: TamaĂ±o final del archivo almacenado, en bytes.
          example: 245000

    ValidationError:
      type: object
      description: Respuesta devuelta cuando los metadatos o el archivo no cumplen las validaciones.
      properties:
        errors:
          type: array
          items:
            type: string
          description: ColecciĂłn de mensajes que detallan las fallas encontradas.
          example:
            - "Header x-document-type es requerido"
        upload_id:
          type: string
          format: uuid
          description: ID Ășnico para el registro e historial de la transacciĂłn fallida.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    ForbiddenError:
      type: object
      description: Respuesta de error de autenticaciĂłn.
      properties:
        message:
          type: string
          description: RazĂłn de denegaciĂłn.
          example: "Forbidden"

    InternalError:
      type: object
      description: Respuesta cuando ocurre un problema no controlado del lado del servidor.
      properties:
        error:
          type: string
          description: Detalles descriptivos de la falla.
          example: "Error interno al subir archivo"
