openapi: 3.0.3
info:
  title: Tattersall - Gestor Documental - API de Ingesta de Documentos
  description: |
    # рҹ“„ Tattersall Gestor Documental - API de Ingesta
    
    Bienvenido a la API REST del **Gestor Documental de Tattersall**. Este servicio permite a proveedores externos (satГ©lites) realizar la carga directa de documentos vehiculares hacia la zona de aterrizaje (landing) del sistema.

    ---

    ### рҹҡҖ Inicio RГЎpido (Prueba de ConexiГіn)
    Puedes probar la API de inmediato ejecutando el siguiente comando `curl` en tu terminal (utilizando las credenciales de prueba provistas):

    ```bash
    curl -X PUT "https://{apiId}.execute-api.us-east-1.amazonaws.com/dev/documents" \
      -H "x-api-key: abcdefghijklmnopqrstuvxwyz" \
      -H "Content-Type: application/pdf" \
      -H "x-provider-id: proveedor-ejemplo" \
      -H "x-patente: ABCD12" \
      -H "x-vin: WDB1234567890" \
      -H "x-filename: permiso-circulacion-ABCD12.pdf" \
      --data-binary @ruta/archivo/pdf.pdf
    ```

    ---

    ### рҹ”’ Seguridad y AutenticaciГіn
    Para consumir cualquier recurso de esta API, debes incluir tu clave de acceso en las cabeceras HTTP:
    * **Header:** `x-api-key`
    * **Valor:** Clave provista por el administrador (Ej. `abcdefghijklmnopqrstuvxwyz`).
    * _Peticiones sin esta cabecera o con claves invГЎlidas recibirГЎn una respuesta HTTP `403 Forbidden`._

    ---

    ### рҹ“Ҡ Resumen de Cabeceras (Headers)

    | Cabecera | Tipo | Obligatorio | DescripciГіn | Ejemplo |
    | :--- | :---: | :---: | :--- | :--- |
    | `x-api-key` | `string` | **SГӯ** рҹ”‘ | Clave de API asignada | `abcdefghijklmnopqrstuvxwyz` |
    | `Content-Type` | `string` | **SГӯ** рҹ“Ғ | Tipo MIME del archivo | `application/pdf` |
    | `x-provider-id` | `string` | **SГӯ** рҹ“Ў | ID del proveedor (carpeta destino + auditorГӯa) | valor otorgado por administrador de API. |
    | `x-patente` | `string` | вҡ пёҸ Condicional рҹҡ— | Patente del vehГӯculo. Al menos uno de `x-patente` o `x-vin` es requerido. | `ABCD12` |
    | `x-vin` | `string` | вҡ пёҸ Condicional рҹҡ— | VIN (chasis) del vehГӯculo. Al menos uno de `x-patente` o `x-vin` es requerido. | `WDB1234567890` |
    | `x-filename` | `string` | **SГӯ** рҹ“„ | Nombre original del archivo con extensiГіn | `permiso-circulacion-ABCD12.pdf` |

    ---

    ### рҹ“Ӯ Formatos de Archivo Aceptados
    El servicio acepta Гәnicamente los siguientes tipos de contenido en el cuerpo de la peticiГіn (`body`):
    * рҹ“‘ **PDF:** `application/pdf`
    * рҹ“қ **Word antiguo:** `application/msword` (`.doc`)
    * рҹ“қ **Word moderno:** `application/vnd.openxmlformats-officedocument.wordprocessingml.document` (`.docx`)

    ---

    ### вҡҷпёҸ LГӯmites del Servicio
    * **TamaГұo MГЎximo:** `10 MB` por archivo (lГӯmite fГӯsico de API Gateway).
    * **Rate Limiting:** `20 peticiones/segundo` por API Key.
    * **Burst Limit:** `50 peticiones` concurrentes.
    * **Cuota Diaria:** `5,000 peticiones/dГӯa` por API Key.
  version: 3.0.0
  contact:
    name: Equipo Escala 24x7

servers:
  - url: https://{apiId}.execute-api.us-east-1.amazonaws.com/dev
    description: Ambiente Desarrollo (Plantilla)
    variables:
      apiId:
        default: "REMPLAZAR_CON_API_ID"

security:
  - ApiKeyAuth: []

tags:
  - name: Ingesta de Documentos
    description: Operaciones para cargar archivos digitales a la zona de landing del sistema.

paths:
  /documents:
    put:
      tags:
        - Ingesta de Documentos
      summary: Carga directa de documento vehicular
      description: |
        Sube un archivo PDF o Word directamente en formato binario a la zona de landing.
        El tamaГұo del archivo no debe exceder los 10 MB.
        
        **El proveedor NO necesita clasificar el documento** вҖ” solo identificarse y enviar el archivo con su nombre original. La clasificaciГіn (tipo de documento, extracciГіn de patente/VIN) se realiza automГЎticamente en una etapa posterior.
      operationId: uploadDocument
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-provider-id
          in: header
          required: true
          description: |
            Identificador Гәnico del proveedor o satГ©lite. Determina la carpeta de destino en el bucket y se usa para trazabilidad y auditorГӯa.
            
            **Valores permitidos:** Administrador de API otorgarГЎ valor permitido.
            
            Para solicitar un nuevo provider_id, contactar al equipo de administraciГіn.
          schema:
            type: string
            enum:
              - proveedor1
              - proveedor2
              - proveedorN
            example: "nombre_proveedor"
        - name: x-patente
          in: header
          required: false
          description: |
            Patente (placa) del vehГӯculo asociado al documento.
            **Al menos uno de `x-patente` o `x-vin` debe estar presente.**
            Si se tienen ambos, enviar ambos.
          schema:
            type: string
            example: "ABCD12"
        - name: x-vin
          in: header
          required: false
          description: |
            VIN (nГәmero de chasis) del vehГӯculo asociado al documento.
            **Al menos uno de `x-patente` o `x-vin` debe estar presente.**
            Si se tienen ambos, enviar ambos.
          schema:
            type: string
            example: "WDB1234567890"
        - name: x-filename
          in: header
          required: true
          description: Nombre original del archivo, incluyendo la extensiГіn (.pdf, .doc, .docx).
          schema:
            type: string
            example: "permiso-circulacion-ABCD12.pdf"
      requestBody:
        description: Contenido binario del archivo a subir.
        required: true
        content:
          application/pdf:
            schema:
              type: string
              format: binary
          application/msword:
            schema:
              type: string
              format: binary
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Documento subido exitosamente a la zona de landing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSuccess'
              example:
                message: "Documento subido exitosamente"
                upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                s3_key: "ingesta/proveedor-ejemplo/ABCD12-WDB1234567890/permiso-circulacion-abcd12-20260624_152040-8d0323e7.pdf"
                size_bytes: 245000
        '400':
          description: Error en la validaciГіn de cabeceras o tipo de archivo no soportado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                missing_headers:
                  summary: Cabeceras Requeridas Faltantes
                  value:
                    errors:
                      - "Header x-provider-id es requerido"
                      - "Al menos uno de los headers x-patente o x-vin es requerido"
                      - "Header x-filename es requerido"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                invalid_content_type:
                  summary: Content-Type No Soportado
                  value:
                    errors:
                      - "Content-Type no soportado. Permitidos: ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document']"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        '403':
          description: Clave de API no provista, expirada o no autorizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
              example:
                message: "Forbidden"
        '500':
          description: Falla interna durante el procesamiento del archivo en el servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Clave de API de autenticaciГіn.
        
        * **Para Pruebas:** Solicite una clave Гәnica al equipo de Tattersall / Escala 24x7.
        * **Para ProducciГіn:** Solicite una clave Гәnica al equipo de Tattersall / Escala 24x7.

  schemas:
    UploadSuccess:
      type: object
      description: Respuesta exitosa tras cargar correctamente un documento.
      properties:
        message:
          type: string
          description: Mensaje descriptivo del estado.
          example: "Documento subido exitosamente"
        upload_id:
          type: string
          format: uuid
          description: Identificador Гәnico universal (UUID) de la transacciГіn para auditorГӯas.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        s3_key:
          type: string
          description: Ruta exacta donde quedГі almacenado el archivo en el bucket S3.
          example: "ingesta/proveedor-ejemplo/ABCD12-WDB1234567890/permiso-circulacion-abcd12-20260624_152040-8d0323e7.pdf"
        size_bytes:
          type: integer
          description: TamaГұo final del archivo almacenado, en bytes.
          example: 245000

    ValidationError:
      type: object
      description: Respuesta devuelta cuando los metadatos o el archivo no cumplen las validaciones.
      properties:
        errors:
          type: array
          items:
            type: string
          description: ColecciГіn de mensajes que detallan las fallas encontradas.
          example:
            - "Header x-provider-id es requerido"
        upload_id:
          type: string
          format: uuid
          description: ID Гәnico para el registro e historial de la transacciГіn fallida.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    ForbiddenError:
      type: object
      description: Respuesta de error de autenticaciГіn.
      properties:
        message:
          type: string
          description: RazГіn de denegaciГіn.
          example: "Forbidden"

    InternalError:
      type: object
      description: Respuesta cuando ocurre un problema no controlado del lado del servidor.
      properties:
        error:
          type: string
          description: Detalles descriptivos de la falla.
          example: "Error interno al subir archivo"
