openapi: 3.0.3
info:
  title: Tattersall IDP - API de Ingesta de Documentos
  description: |
    # 📄 Tattersall IDP - API de Ingesta
    
    Bienvenido a la API REST de **Tattersall Document Processing (IDP)**. Este servicio permite a proveedores externos (satélites) realizar la carga directa de documentos vehiculares hacia la zona de aterrizaje (landing) del sistema de gestión documental inteligente.

    ---

    ### 🚀 Inicio Rápido (Prueba de Conexión)
    Puedes probar la API de inmediato ejecutando el siguiente comando `curl` en tu terminal (utilizando las credenciales de prueba provistas):

    ```bash
    curl -X PUT "https://kkstm29w21.execute-api.us-east-1.amazonaws.com/dev/documents" \
      -H "x-api-key: abcdefghijklmnopqrstuvxwyz" \
      -H "Content-Type: application/pdf" \
      -H "x-provider-id: escala24x7-test" \
      -H "x-filename: permiso-circulacion-ABCD12.pdf" \
      --data-binary @ruta/archivo/pdf.pdf
    ```

    ---

    ### 🚀 Flujo de Procesamiento
    1. El proveedor sube el documento via esta API.
    2. El archivo aterriza en un bucket RAW (zona de landing) organizado por proveedor.
    3. Un proceso automático posterior (Step Function + Bedrock) identifica el tipo de documento, extrae patente/VIN, y lo clasifica en la estructura final.
    4. El proveedor **NO necesita clasificar** el documento — solo subirlo.

    ---

    ### 🔒 Seguridad y Autenticación
    Para consumir cualquier recurso de esta API, debes incluir tu clave de acceso en las cabeceras HTTP:
    * **Header:** `x-api-key`
    * **Valor:** Clave provista por el administrador (Ej. `abcdefghijklmnopqrstuvxwyz` para pruebas).
    * _Peticiones sin esta cabecera o con claves inválidas recibirán una respuesta HTTP `403 Forbidden`._

    ---

    ### 📊 Resumen de Cabeceras (Headers)

    | Cabecera | Tipo | Obligatorio | Descripción | Ejemplo |
    | :--- | :---: | :---: | :--- | :--- |
    | `x-api-key` | `string` | **Sí** 🔑 | Clave de API asignada | `abcdefghijklmnopqrstuvxwyz` |
    | `Content-Type` | `string` | **Sí** 📁 | Tipo MIME del archivo | `application/pdf` |
    | `x-provider-id` | `string` | **Sí** 📡 | ID del proveedor (carpeta destino + auditoría) | `gespar` |
    | `x-filename` | `string` | **Sí** 📄 | Nombre original del archivo con extensión | `permiso-circulacion-ABCD12.pdf` |

    ---

    ### 📂 Formatos de Archivo Aceptados
    El servicio acepta únicamente los siguientes tipos de contenido en el cuerpo de la petición (`body`):
    * 📑 **PDF:** `application/pdf`
    * 📝 **Word antiguo:** `application/msword` (`.doc`)
    * 📝 **Word moderno:** `application/vnd.openxmlformats-officedocument.wordprocessingml.document` (`.docx`)

    ---

    ### 📁 Estructura de Almacenamiento
    Los archivos se depositan en el bucket de landing con la siguiente estructura:
    ```
    ingesta/{provider_id}/{filename-original-sanitizado}-{timestamp}-{id-unico}.{ext}
    ```
    Ejemplo:
    ```
    ingesta/gespar/permiso-circulacion-abcd12-20260624_152040-8d0323e7.pdf
    ```

    La clasificación por tipo de documento y patente/VIN se realiza **automáticamente** en una etapa posterior de procesamiento. El proveedor solo se preocupa de enviar el archivo.

    ---

    ### ⚙️ Límites del Servicio
    * **Tamaño Máximo:** `10 MB` por archivo (límite físico de API Gateway).
    * **Rate Limiting:** `20 peticiones/segundo` por API Key.
    * **Burst Limit:** `50 peticiones` concurrentes.
    * **Cuota Diaria:** `5,000 peticiones/día` por API Key.
  version: 3.0.0
  contact:
    name: Equipo Escala 24x7

servers:
  - url: https://kkstm29w21.execute-api.us-east-1.amazonaws.com/dev
    description: Servidor de Pruebas (API Gateway de Pruebas)
  - url: https://{apiId}.execute-api.us-east-1.amazonaws.com/dev
    description: Ambiente Desarrollo (Plantilla)
    variables:
      apiId:
        default: "REPLACE_CON_API_ID"

security:
  - ApiKeyAuth: []

tags:
  - name: Ingesta de Documentos
    description: Operaciones para cargar archivos digitales a la zona de landing del sistema.

paths:
  /documents:
    put:
      tags:
        - Ingesta de Documentos
      summary: Carga directa de documento vehicular
      description: |
        Sube un archivo PDF o Word directamente en formato binario a la zona de landing.
        El tamaño del archivo no debe exceder los 10 MB.
        
        **El proveedor NO necesita clasificar el documento** — solo identificarse y enviar el archivo con su nombre original. La clasificación (tipo de documento, extracción de patente/VIN) se realiza automáticamente en una etapa posterior.
      operationId: uploadDocument
      security:
        - ApiKeyAuth: []
      parameters:
        - name: x-provider-id
          in: header
          required: true
          description: |
            Identificador único del proveedor o satélite. Determina la carpeta de destino en el bucket y se usa para trazabilidad y auditoría.
            
            **Valores permitidos:** `gespar` | `controlcar` | `doki`
            
            Para solicitar un nuevo provider_id, contactar al equipo de administración.
          schema:
            type: string
            enum:
              - gespar
              - controlcar
              - doki
            example: "gespar"
        - name: x-filename
          in: header
          required: true
          description: Nombre original del archivo, incluyendo la extensión (.pdf, .doc, .docx).
          schema:
            type: string
            example: "permiso-circulacion-ABCD12.pdf"
      requestBody:
        description: Contenido binario del archivo a subir.
        required: true
        content:
          application/pdf:
            schema:
              type: string
              format: binary
          application/msword:
            schema:
              type: string
              format: binary
          application/vnd.openxmlformats-officedocument.wordprocessingml.document:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Documento subido exitosamente a la zona de landing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSuccess'
              example:
                message: "Documento subido exitosamente"
                upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                s3_key: "ingesta/gespar/permiso-circulacion-abcd12-20260624_152040-8d0323e7.pdf"
                size_bytes: 245000
        '400':
          description: Error en la validación de cabeceras o tipo de archivo no soportado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              examples:
                missing_headers:
                  summary: Cabeceras Requeridas Faltantes
                  value:
                    errors:
                      - "Header x-provider-id es requerido"
                      - "Header x-filename es requerido"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                invalid_content_type:
                  summary: Content-Type No Soportado
                  value:
                    errors:
                      - "Content-Type no soportado. Permitidos: ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document']"
                    upload_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        '403':
          description: Clave de API no provista, expirada o no autorizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
              example:
                message: "Forbidden"
        '500':
          description: Falla interna durante el procesamiento del archivo en el servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Clave de API de autenticación.
        
        * **Para Pruebas:** Utilice `abcdefghijklmnopqrstuvxwyz`
        * **Para Producción:** Solicite una clave única al equipo de Tattersall / Escala 24x7.

  schemas:
    UploadSuccess:
      type: object
      description: Respuesta exitosa tras cargar correctamente un documento.
      properties:
        message:
          type: string
          description: Mensaje descriptivo del estado.
          example: "Documento subido exitosamente"
        upload_id:
          type: string
          format: uuid
          description: Identificador único universal (UUID) de la transacción para auditorías.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        s3_key:
          type: string
          description: Ruta exacta donde quedó almacenado el archivo en el bucket S3.
          example: "ingesta/gespar/permiso-circulacion-abcd12-20260624_152040-8d0323e7.pdf"
        size_bytes:
          type: integer
          description: Tamaño final del archivo almacenado, en bytes.
          example: 245000

    ValidationError:
      type: object
      description: Respuesta devuelta cuando los metadatos o el archivo no cumplen las validaciones.
      properties:
        errors:
          type: array
          items:
            type: string
          description: Colección de mensajes que detallan las fallas encontradas.
          example:
            - "Header x-provider-id es requerido"
        upload_id:
          type: string
          format: uuid
          description: ID único para el registro e historial de la transacción fallida.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    ForbiddenError:
      type: object
      description: Respuesta de error de autenticación.
      properties:
        message:
          type: string
          description: Razón de denegación.
          example: "Forbidden"

    InternalError:
      type: object
      description: Respuesta cuando ocurre un problema no controlado del lado del servidor.
      properties:
        error:
          type: string
          description: Detalles descriptivos de la falla.
          example: "Error interno al subir archivo"
